version: 2

models:
  - name: fct_building_availability
    columns:
      - name: building_id
        tests: [not_null, unique]
      - name: building_name
        tests: [not_null]
      - name: address
      - name: total_rooms
        tests: [not_null]
      - name: total_beds
        tests: [not_null]
      - name: total_students
        tests: [not_null]
      - name: total_available_beds
        tests: [not_null]
      - name: building_occupancy_rate
      - name: rooms_with_private_bathroom
      - name: rooms_with_kitchen

  - name: fct_student_assignments
    columns:
      - name: assignment_id
        tests: [not_null, unique]
      - name: student_id
        tests: [not_null]
      - name: student_name
        tests: [not_null]
      - name: wants_ac
      - name: wants_dining
      - name: wants_kitchen
      - name: wants_private_bathroom
      - name: room_id
        tests: [not_null]
      - name: building_id
        tests: [not_null]
      - name: room_number
        tests: [not_null]
      - name: num_beds
        tests: [not_null]
      - name: has_private_bathroom
      - name: has_kitchen
      - name: building_name
        tests: [not_null]
      - name: address
      - name: has_ac
      - name: has_dining
      - name: assigned_at
      - name: _ingested_at